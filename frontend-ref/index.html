<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal de Gestão de Pessoas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<header>
  <h2>Portal de Gestão de Pessoas</h2>
  <button id="dark-mode-btn" onclick="toggleDarkMode()" title="Modo escuro">
    <i class="fa-solid fa-moon"></i>
  </button>
  <div class="user-menu" id="user-menu">
    <div class="user" id="user-btn" onclick="toggleUserMenu()" title="Minha conta">
      <i class="fa-solid fa-user" aria-hidden="true"></i>
    </div>
    <div class="user-dropdown" id="user-dropdown">
      <div class="user-dropdown-info" id="user-dropdown-info">
        <div class="user-dropdown-avatar" id="user-dropdown-avatar">
          <i class="fa-solid fa-user"></i>
        </div>
        <div>
          <div class="user-dropdown-nome" id="user-dropdown-nome">Carregando...</div>
          <div class="user-dropdown-tipo" id="user-dropdown-tipo"></div>
        </div>
      </div>
      <div class="user-dropdown-divider"></div>
      <a href="perfil.html" class="user-dropdown-item">
        <i class="fa-solid fa-user-pen"></i> Meu Perfil
      </a>
      <button class="user-dropdown-item user-dropdown-sair" id="btn-sair-header" onclick="sairDaConta()" style="display:none">
        <i class="fa-solid fa-right-from-bracket"></i> Sair da conta
      </button>
    </div>
  </div>
</header>

<nav class="navbar">
  <ul class="navbar-nav">
    <li class="navbar-item">
      <a href="index.html" class="navbar-link active">
        <i class="fa-solid fa-home"></i>
        <span>Início</span>
      </a>
    </li>
    <li class="navbar-item" data-role="admin">
      <a href="pages/cadastrar.html" class="navbar-link">
        <i class="fa-solid fa-user-plus"></i>
        <span>Cadastrar</span>
      </a>
    </li>
    <li class="navbar-item" data-role="gestorOrAdmin">
      <a href="pages/consultar.html" class="navbar-link">
        <i class="fa-solid fa-magnifying-glass"></i>
        <span>Consultar</span>
      </a>
    </li>
    <li class="navbar-item navbar-item-dropdown">
      <a href="#" class="navbar-link navbar-link-dropdown" onclick="toggleSubmenu(event, this)">
        <i class="fa-solid fa-star"></i>
        <span>Avaliações</span>
        <i class="fa-solid fa-chevron-down navbar-chevron"></i>
      </a>
      <ul class="navbar-submenu">
        <li><a href="pages/avaliacoes.html" class="navbar-submenu-link"><i class="fa-solid fa-star"></i> Avaliações</a></li>
        <li><a href="pages/nine-box.html" class="navbar-submenu-link"><i class="fa-solid fa-th"></i> Nine Box</a></li>
        <li><a href="pages/competencias.html" class="navbar-submenu-link"><i class="fa-solid fa-clipboard-check"></i> Competências</a></li>
        <li><a href="pages/avaliacao-180.html" class="navbar-submenu-link"><i class="fa-solid fa-rotate"></i> 180°</a></li>
        <li><a href="pages/avaliacao-360.html" class="navbar-submenu-link"><i class="fa-solid fa-arrows-spin"></i> 360°</a></li>
      </ul>
    </li>
    <li class="navbar-item" data-role="gestorOrAdmin">
      <a href="pages/relatorios.html" class="navbar-link">
        <i class="fa-solid fa-chart-bar"></i>
        <span>Relatórios</span>
      </a>
    </li>
    <li class="navbar-item">
      <a href="perfil.html" class="navbar-link">
        <i class="fa-solid fa-user"></i>
        <span>Perfil</span>
      </a>
    </li>
  </ul>
</nav>

<style>
  .dash-welcome {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 48px 32px;
    background: var(--surface);
    border: 1.5px dashed var(--border);
    border-radius: var(--radius);
    text-align: center;
    max-width: 420px;
    width: 100%;
  }
  .dash-welcome i { font-size: 52px; color: var(--primary-light); }
  .dash-welcome h3 { font-size: 20px; font-weight: 700; color: var(--primary); margin: 0; }
  .dash-welcome p { font-size: 14px; color: var(--text-muted); margin: 0; line-height: 1.5; }
  .dash-welcome-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 24px; background: var(--primary); color: white;
    border-radius: var(--radius-sm); font-size: 14px; font-weight: 600;
    text-decoration: none; transition: all 0.2s; margin-top: 4px;
  }
  .dash-welcome-btn:hover { background: #1d4ed8; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(30,58,138,0.25); }
  body.dark-mode .dash-welcome { background: #1e293b; border-color: #334155; }
</style>

<main class="wrapper wrapper-center">
  <div class="dashboard">

    <!--
      dash-stats: container acima dos cards.
      O JS injeta aqui:
        - o bloco de boas-vindas (quando não há dados / backend offline)
        - os cards de stats (quando há dados)
    -->
    <div class="dash-stats" id="dash-stats"></div>

    <!-- Menu de cards -->
    <div class="container" id="menu-cards">
      <!-- Cards injetados pelo JS conforme permissão -->
    </div>

  </div>
</main>

<script type="module">
  import { requireAuth, isAdmin, isGestorOrAdmin, getUser } from './js/auth.js';
  import { reportsApi } from './js/api.js';
  import './js/navbar.js';

  requireAuth();

  const user      = getUser();
  const cards     = document.getElementById('menu-cards');
  const statsBox  = document.getElementById('dash-stats');

  // ---- CARDS (sem "Meu Perfil") ----
  const allCards = [
    { href: 'pages/cadastrar.html',    icon: 'fa-user-plus',        label: 'Cadastrar',    role: 'admin' },
    { href: 'pages/consultar.html',    icon: 'fa-magnifying-glass', label: 'Consultar',    role: 'gestorOrAdmin' },
    { href: 'pages/avaliacoes.html',   icon: 'fa-star',             label: 'Avaliações',   role: 'all' },
    { href: 'pages/nine-box.html',     icon: 'fa-th',               label: 'Nine Box',     role: 'gestorOrAdmin' },
    { href: 'pages/competencias.html', icon: 'fa-clipboard-check',  label: 'Competências', role: 'all' },
    { href: 'pages/relatorios.html',   icon: 'fa-chart-bar',        label: 'Relatórios',   role: 'all' },
  ];

  function canSee(role) {
    if (role === 'all') return true;
    if (role === 'admin') return isAdmin();
    if (role === 'gestorOrAdmin') return isGestorOrAdmin();
    return false;
  }

  cards.innerHTML = allCards
    .filter(c => canSee(c.role))
    .map(c => `
      <a href="${c.href}" class="card">
        <i class="fa-solid ${c.icon}"></i>
        <p>${c.label}</p>
      </a>
    `).join('');

  // ---- WELCOME (bloco acima dos cards, igual ao /frontend original) ----
  function mostrarWelcome() {
    statsBox.innerHTML = `
      <div class="dash-welcome">
        <i class="fa-solid fa-users"></i>
        <h3>Bem-vindo ao Portal de Gestão de Pessoas!</h3>
        <p>Comece cadastrando gestores e colaboradores para usar o sistema.</p>
        <a href="pages/cadastrar.html" class="dash-welcome-btn">
          <i class="fa-solid fa-user-plus"></i> Cadastrar primeira pessoa
        </a>
      </div>`;
  }

  function mostrarStats(d) {
    statsBox.innerHTML = `
      <div class="dash-stat">
        <i class="fa-solid fa-user-tie"></i>
        <div>
          <span class="dash-stat-val">${d.usuarios?.porTipo?.gestor ?? '—'}</span>
          <span class="dash-stat-label">Gestores</span>
        </div>
      </div>
      <div class="dash-stat">
        <i class="fa-solid fa-users"></i>
        <div>
          <span class="dash-stat-val">${d.usuarios?.porTipo?.colaborador ?? '—'}</span>
          <span class="dash-stat-label">Colaboradores</span>
        </div>
      </div>
      <div class="dash-stat">
        <i class="fa-solid fa-star"></i>
        <div>
          <span class="dash-stat-val">${d.avaliacoes?.total ?? '—'}</span>
          <span class="dash-stat-label">Avaliações</span>
        </div>
      </div>
      <div class="dash-stat">
        <i class="fa-solid fa-th"></i>
        <div>
          <span class="dash-stat-val">${d.nineBox?.total ?? '—'}</span>
          <span class="dash-stat-label">Nine Box</span>
        </div>
      </div>`;
  }

  // Gestor/admin: tenta carregar stats; se falhar ou não houver dados, mostra welcome
  if (isGestorOrAdmin()) {
    try {
      const res = await reportsApi.dashboard();
      const d   = res.data;
      const totalUsuarios = d.usuarios?.total ?? 0;

      if (totalUsuarios <= 1) {
        // Só o próprio admin existe — mostra boas-vindas
        mostrarWelcome();
      } else {
        mostrarStats(d);
      }
    } catch {
      // Backend offline — mostra boas-vindas
      mostrarWelcome();
    }
  } else {
    // Colaborador: welcome sem botão de cadastrar
    statsBox.innerHTML = `
      <div class="dash-welcome">
        <i class="fa-solid fa-users"></i>
        <h3>Bem-vindo ao Portal de Gestão de Pessoas!</h3>
        <p>Use o menu acima para acessar avaliações e competências.</p>
      </div>`;
  }
</script>
</body>
</html>
