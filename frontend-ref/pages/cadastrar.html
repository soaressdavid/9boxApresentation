<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastrar — Portal de Gestão de Pessoas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .pg-wrapper { justify-content: center; padding: 40px 20px; }
    .pg-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      padding: 32px;
      width: 100%;
      max-width: 480px;
      border: 1.5px solid var(--border);
    }
    .pg-card h3 { color: var(--primary); font-size: 18px; font-weight: 700; margin-bottom: 24px; }
    .pg-type-toggle {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .pg-type-btn {
      flex: 1;
      padding: 10px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .pg-type-btn.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
      box-shadow: none;
      transform: none;
    }
    .pg-type-btn:hover:not(.active) { border-color: var(--primary-light); color: var(--primary); background: #eff6ff; transform: none; box-shadow: none; }
    .pg-field { margin-bottom: 16px; }
    .pg-field label { display: block; font-size: 13px; font-weight: 600; color: var(--primary); margin-bottom: 6px; }
    .pg-field input,
    .pg-field select {
      width: 100%;
      padding: 11px 14px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: #fafafa;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .pg-field input:focus,
    .pg-field select:focus {
      border-color: var(--primary-light);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
      outline: none;
      background: var(--surface);
    }
    .pg-btn {
      width: 100%;
      padding: 13px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .pg-btn:hover { background: #1d4ed8; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(30, 58, 138, 0.25); }
    .ra-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    body.dark-mode .pg-card { background: #1e293b; }
    body.dark-mode .pg-field input,
    body.dark-mode .pg-field select { background: #0f172a; color: #f1f5f9; border-color: #334155; }
    body.dark-mode .pg-type-btn:not(.active) { border-color: #334155; color: #94a3b8; }
  </style>
</head>
<body>

<header>
  <h2>Cadastrar Usuário</h2>
  <button id="dark-mode-btn" onclick="toggleDarkMode()" title="Modo escuro">
    <i class="fa-solid fa-moon"></i>
  </button>
  <div class="user-menu" id="user-menu">
    <div class="user" id="user-btn" onclick="toggleUserMenu()" title="Minha conta">
      <i class="fa-solid fa-user"></i>
    </div>
    <div class="user-dropdown" id="user-dropdown">
      <div class="user-dropdown-info">
        <div class="user-dropdown-avatar" id="user-dropdown-avatar"><i class="fa-solid fa-user"></i></div>
        <div>
          <div class="user-dropdown-nome" id="user-dropdown-nome">Carregando...</div>
          <div class="user-dropdown-tipo" id="user-dropdown-tipo"></div>
        </div>
      </div>
      <div class="user-dropdown-divider"></div>
      <a href="../perfil.html" class="user-dropdown-item"><i class="fa-solid fa-user-pen"></i> Meu Perfil</a>
      <button class="user-dropdown-item user-dropdown-sair" id="btn-sair-header" onclick="sairDaConta()" style="display:none">
        <i class="fa-solid fa-right-from-bracket"></i> Sair da conta
      </button>
    </div>
  </div>
</header>

<nav class="navbar">
  <ul class="navbar-nav">
    <li class="navbar-item"><a href="../index.html" class="navbar-link"><i class="fa-solid fa-home"></i><span>Início</span></a></li>
    <li class="navbar-item" data-role="admin"><a href="cadastrar.html" class="navbar-link active"><i class="fa-solid fa-user-plus"></i><span>Cadastrar</span></a></li>
    <li class="navbar-item" data-role="gestorOrAdmin"><a href="consultar.html" class="navbar-link"><i class="fa-solid fa-magnifying-glass"></i><span>Consultar</span></a></li>
    <li class="navbar-item navbar-item-dropdown">
      <a href="#" class="navbar-link navbar-link-dropdown" onclick="toggleSubmenu(event, this)">
        <i class="fa-solid fa-star"></i><span>Avaliações</span><i class="fa-solid fa-chevron-down navbar-chevron"></i>
      </a>
      <ul class="navbar-submenu">
        <li><a href="avaliacoes.html" class="navbar-submenu-link"><i class="fa-solid fa-star"></i> Avaliações</a></li>
        <li><a href="nine-box.html" class="navbar-submenu-link"><i class="fa-solid fa-th"></i> Nine Box</a></li>
        <li><a href="competencias.html" class="navbar-submenu-link"><i class="fa-solid fa-clipboard-check"></i> Competências</a></li>
        <li><a href="avaliacao-180.html" class="navbar-submenu-link"><i class="fa-solid fa-rotate"></i> 180°</a></li>
        <li><a href="avaliacao-360.html" class="navbar-submenu-link"><i class="fa-solid fa-arrows-spin"></i> 360°</a></li>
      </ul>
    </li>
    <li class="navbar-item" data-role="gestorOrAdmin"><a href="relatorios.html" class="navbar-link"><i class="fa-solid fa-chart-bar"></i><span>Relatórios</span></a></li>
    <li class="navbar-item"><a href="../perfil.html" class="navbar-link"><i class="fa-solid fa-user"></i><span>Perfil</span></a></li>
  </ul>
</nav>

<main class="wrapper pg-wrapper">
  <div class="pg-card">
    <h3><i class="fa-solid fa-user-plus"></i> Novo Usuário</h3>

    <!-- Tipo -->
    <div class="pg-type-toggle" role="group" aria-label="Tipo de usuário">
      <button class="pg-type-btn" data-tipo="gestor" onclick="setTipoCad('gestor')">
        <i class="fa-solid fa-user-tie"></i> Gestor
      </button>
      <button class="pg-type-btn active" data-tipo="colaborador" onclick="setTipoCad('colaborador')">
        <i class="fa-solid fa-user"></i> Colaborador
      </button>
    </div>
    <input type="hidden" id="cad-tipo" value="colaborador">

    <!-- RA -->
    <div class="pg-field">
      <label for="cad-ra">RA <span style="color:var(--danger)">*</span></label>
      <input type="text" id="cad-ra" placeholder="Ex: 2022001" maxlength="10" autocomplete="off">
      <span class="ra-hint">Registro Acadêmico da pessoa (5 a 10 caracteres)</span>
    </div>

    <!-- Nome -->
    <div class="pg-field">
      <label for="cad-nome">Nome completo <span style="color:var(--danger)">*</span></label>
      <input type="text" id="cad-nome" placeholder="Nome completo" autocomplete="off">
    </div>

    <!-- E-mail -->
    <div class="pg-field">
      <label for="cad-email">E-mail institucional <span style="color:var(--danger)">*</span></label>
      <input type="email" id="cad-email" placeholder="nome@faculdade.edu.br">
    </div>

    <!-- Senha -->
    <div class="pg-field">
      <label for="cad-senha">Senha <span style="color:var(--danger)">*</span></label>
      <input type="password" id="cad-senha" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
    </div>

    <!-- Cargo -->
    <div class="pg-field">
      <label for="cad-cargo">Cargo</label>
      <input type="text" id="cad-cargo" placeholder="Ex: Desenvolvedor, Analista...">
    </div>

    <!-- Departamento -->
    <div class="pg-field">
      <label for="cad-departamento">Departamento</label>
      <input type="text" id="cad-departamento" placeholder="Ex: TI, RH, Financeiro...">
    </div>

    <button class="pg-btn" id="btn-cadastrar" onclick="cadastrarUsuario()">
      <i class="fa-solid fa-user-plus"></i> Cadastrar
    </button>
  </div>
</main>

<script type="module">
  import { requireRole } from '../js/auth.js';
  import { usersApi } from '../js/api.js';
  import { validateCadastroForm } from '../js/validators.js';
  import { showToast } from '../js/components/toast.js';
  import '../js/navbar.js';

  // Apenas admin pode cadastrar
  requireRole('admin');

  window.setTipoCad = function(tipo) {
    document.getElementById('cad-tipo').value = tipo;
    document.querySelectorAll('.pg-type-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.tipo === tipo);
    });
  };

  window.cadastrarUsuario = async function() {
    const ra           = document.getElementById('cad-ra').value.trim();
    const nome         = document.getElementById('cad-nome').value.trim();
    const email        = document.getElementById('cad-email').value.trim().toLowerCase();
    const senha        = document.getElementById('cad-senha').value;
    const tipo         = document.getElementById('cad-tipo').value;
    const cargo        = document.getElementById('cad-cargo').value.trim();
    const departamento = document.getElementById('cad-departamento').value.trim();

    if (!validateCadastroForm({ ra, nome, email, senha, tipo })) return;

    const btn = document.getElementById('btn-cadastrar');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Cadastrando...';

    try {
      await usersApi.register({ ra, nome, email, senha, tipo, cargo, departamento });
      showToast('Usuário cadastrado com sucesso!', 'success');

      // Limpa o formulário
      ['cad-ra','cad-nome','cad-email','cad-senha','cad-cargo','cad-departamento'].forEach(id => {
        document.getElementById(id).value = '';
      });
      window.setTipoCad('colaborador');
    } catch {
      // Erro já exibido pelo api.js
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-user-plus"></i> Cadastrar';
    }
  };
</script>
</body>
</html>
