  <link rel="stylesheet" href="../css/pages.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<header>

  <a href="../index.html">Voltar</a>
</header>

<nav class="navbar">
  <ul class="navbar-nav">
    <li class="navbar-item">
      <a href="../index.html" class="navbar-link">
        <i class="fa-solid fa-home"></i>
        <span>Início</span>
      </a>
    </li>
    <li class="navbar-item">
      <a href="cadastrar.html" class="navbar-link">
        <i class="fa-solid fa-user-plus"></i>
        <span>Cadastrar</span>
      </a>
    </li>
    <li class="navbar-item">
      <a href="consultar.html" class="navbar-link">
        <i class="fa-solid fa-magnifying-glass"></i>
        <span>Consultar</span>
      </a>
    </li>
    <li class="navbar-item navbar-item-dropdown">
      <a href="#" class="navbar-link navbar-link-dropdown" onclick="toggleSubmenu(event, this)">
        <i class="fa-solid fa-star"></i>
        <span>Avaliações</span>
        <i class="fa-solid fa-chevron-down navbar-chevron"></i>
      </a>
      <ul class="navbar-submenu">
        <li><a href="avaliacoes.html" class="navbar-submenu-link"><i class="fa-solid fa-star"></i> Avaliações</a></li>
        <li><a href="nine-box.html" class="navbar-submenu-link"><i class="fa-solid fa-th"></i> Nine Box</a></li>
        <li><a href="competencias.html" class="navbar-submenu-link"><i class="fa-solid fa-clipboard-check"></i> Competências</a></li>
        <li><a href="avaliacao-180.html" class="navbar-submenu-link"><i class="fa-solid fa-rotate"></i> 180°</a></li>
      </ul>
    </li>
    <li class="navbar-item">
      <a href="relatorios.html" class="navbar-link active">
        <i class="fa-solid fa-chart-bar"></i>
        <span>Relatórios</span>
      </a>
    </li>
    <li class="navbar-item">
      <a href="../perfil.html" class="navbar-link">
        <i class="fa-solid fa-user"></i>
        <span>Perfil</span>
      </a>

        <i class="fa-solid fa-circle-info"></i>

      </a>
    </li>
  </ul>
</nav>

<main class="wrapper pg-wrapper">
  <div class="pg-card pg-card-wide">

    <!-- RESUMO CARDS -->
    <div class="rel-resumo" id="rel-resumo"></div>

    <!-- TOOLBAR -->
    <div class="pg-toolbar" style="margin-top: 24px;">
      <div class="pg-filtros">
        <button class="pg-filtro active" data-filtro="todos" onclick="filtrarRel('todos')">Todos</button>
        <button class="pg-filtro" data-filtro="professor" onclick="filtrarRel('professor')">Professores</button>
        <button class="pg-filtro" data-filtro="estagiario" onclick="filtrarRel('estagiario')">Estagiários</button>
      </div>
      <div style="display:flex;gap:10px;align-items:center">
        <div class="pg-search-wrap">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" id="busca-rel" placeholder="Buscar avaliado..." oninput="filtrarRel()">
        </div>
        <button onclick="exportarCSV()" style="margin:0;width:auto;padding:8px 16px;font-size:12px;display:flex;align-items:center;gap:6px">
          <i class="fa-solid fa-download"></i> Exportar CSV
        </button>
      </div>
    </div>

    <!-- TABELA -->
    <div class="rel-table-wrap">
      <table class="rel-table" id="rel-tabela">
        <thead>
          <tr>
            <th>Avaliado</th>
            <th>Tipo</th>
            <th>Critérios</th>
            <th>Média</th>
            <th>Comentário</th>
            <th>Data</th>
          </tr>
        </thead>
        <tbody id="rel-tbody">
          <tr><td colspan="6" class="pg-empty">Nenhuma avaliação registrada.</td></tr>
        </tbody>
      </table>
    </div>

  </div>
</main>

<script src="../css/js/script.js"></script>
<script src="../css/js/pages.js"></script>
<script src="../css/js/navbar.js"></script>
</body>
</html>
