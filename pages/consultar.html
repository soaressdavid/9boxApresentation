<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consultar — Portal de Estágio</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/pages.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<header>
  <h2>Consultar</h2>
  <a href="../index.html">Voltar</a>
</header>

<nav class="navbar">
  <ul class="navbar-nav">
    <li class="navbar-item">
      <a href="../index.html" class="navbar-link">
        <i class="fa-solid fa-home"></i>
        <span>Início</span>
      </a>
    </li>
    <li class="navbar-item">
      <a href="cadastrar.html" class="navbar-link">
        <i class="fa-solid fa-user-plus"></i>
        <span>Cadastrar</span>
      </a>
    </li>
    <li class="navbar-item">
      <a href="consultar.html" class="navbar-link active">
        <i class="fa-solid fa-magnifying-glass"></i>
        <span>Consultar</span>
      </a>
    </li>
    <li class="navbar-item navbar-item-dropdown">
      <a href="#" class="navbar-link navbar-link-dropdown" onclick="toggleSubmenu(event, this)">
        <i class="fa-solid fa-star"></i>
        <span>Avaliações</span>
        <i class="fa-solid fa-chevron-down navbar-chevron"></i>
      </a>
      <ul class="navbar-submenu">
        <li><a href="avaliacoes.html" class="navbar-submenu-link"><i class="fa-solid fa-star"></i> Avaliações</a></li>
        <li><a href="nine-box.html" class="navbar-submenu-link"><i class="fa-solid fa-th"></i> Nine Box</a></li>
        <li><a href="competencias.html" class="navbar-submenu-link"><i class="fa-solid fa-clipboard-check"></i> Competências</a></li>
        <li><a href="avaliacao-180.html" class="navbar-submenu-link"><i class="fa-solid fa-rotate"></i> 180°</a></li>
      </ul>
    </li>
    <li class="navbar-item">
      <a href="relatorios.html" class="navbar-link">
        <i class="fa-solid fa-chart-bar"></i>
        <span>Relatórios</span>
      </a>
    </li>
    <li class="navbar-item">
      <a href="../perfil.html" class="navbar-link">
        <i class="fa-solid fa-user"></i>
        <span>Perfil</span>
      </a>
    </li>
    <li class="navbar-item">
      <a href="sobre.html" class="navbar-link">
        <i class="fa-solid fa-circle-info"></i>
        <span>Sobre</span>
      </a>
    </li>
  </ul>
</nav>

<main class="wrapper pg-wrapper">
  <div class="pg-card pg-card-wide">

    <!-- FILTROS -->
    <div class="pg-toolbar">
      <div class="pg-filtros">
        <button class="pg-filtro active" data-filtro="todos" onclick="filtrarPessoas('todos')">Todos</button>
        <button class="pg-filtro" data-filtro="estagiario" onclick="filtrarPessoas('estagiario')">Estagiários</button>
        <button class="pg-filtro" data-filtro="professor" onclick="filtrarPessoas('professor')">Professores</button>
      </div>
      <div class="pg-search-wrap">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="busca" placeholder="Buscar por nome..." oninput="filtrarPessoas()">
      </div>
    </div>

    <!-- LISTA -->
    <div id="lista-pessoas">
      <p class="pg-empty">Nenhuma pessoa cadastrada.</p>
    </div>

  </div>
</main>

<script src="../css/js/script.js"></script>
<script src="../css/js/pages.js"></script>
<script src="../css/js/navbar.js"></script>
</body>
</html>
