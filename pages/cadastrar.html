</head>

<nav class="navbar">
  <ul class="navbar-nav">
    <li class="navbar-item">
      <a href="../index.html" class="navbar-link">
        <i class="fa-solid fa-home"></i>
        <span>Início</span>
      </a>
    </li>
    <li class="navbar-item">
      <a href="cadastrar.html" class="navbar-link active">
        <i class="fa-solid fa-user-plus"></i>
        <span>Cadastrar</span>
      </a>
    </li>
    <li class="navbar-item">
      <a href="consultar.html" class="navbar-link">
        <i class="fa-solid fa-magnifying-glass"></i>
        <span>Consultar</span>
      </a>
    </li>
    <li class="navbar-item navbar-item-dropdown">
      <a href="#" class="navbar-link navbar-link-dropdown" onclick="toggleSubmenu(event, this)">
        <i class="fa-solid fa-star"></i>
        <span>Avaliações</span>
        <i class="fa-solid fa-chevron-down navbar-chevron"></i>
      </a>
      <ul class="navbar-submenu">
        <li><a href="avaliacoes.html" class="navbar-submenu-link"><i class="fa-solid fa-star"></i> Avaliações</a></li>
        <li><a href="nine-box.html" class="navbar-submenu-link"><i class="fa-solid fa-th"></i> Nine Box</a></li>
        <li><a href="competencias.html" class="navbar-submenu-link"><i class="fa-solid fa-clipboard-check"></i> Competências</a></li>
        <li><a href="avaliacao-180.html" class="navbar-submenu-link"><i class="fa-solid fa-rotate"></i> 180°</a></li>
      </ul>
    </li>
    <li class="navbar-item">

        <i class="fa-solid fa-chart-bar"></i>

      </a>
    </li>
    <li class="navbar-item">
      <a href="../perfil.html" class="navbar-link">

    </li>

<main class="wrapper pg-wrapper">
  <div class="pg-card">

    <!-- TIPO -->
    <div class="pg-type-toggle" role="group">
      <button class="pg-type-btn active" data-tipo="estagiario" onclick="setTipoCad('estagiario')">
        <i class="fa-solid fa-user-tie"></i> Estagiário
      </button>
      <button class="pg-type-btn" data-tipo="professor" onclick="setTipoCad('professor')">
        <i class="fa-solid fa-chalkboard-user"></i> Professor
      </button>
    </div>

    <!-- FOTO -->
    <div class="pg-foto-wrap">
      <div class="pg-foto-preview" id="foto-preview" onclick="document.getElementById('cad-foto').click()">
        <i class="fa-solid fa-camera"></i>
        <span>Adicionar foto</span>
      </div>
      <input type="file" id="cad-foto" accept="image/*" style="display:none" onchange="previewFoto(this)">
    </div>

    <div class="pg-field">
      <label for="cad-nome">Nome completo</label>
      <input type="text" id="cad-nome" placeholder="Digite o nome completo" autocomplete="off">
    </div>

    <div class="pg-field">
      <label for="cad-email">E-mail acadêmico</label>
      <input type="email" id="cad-email" placeholder="nome@universidade.edu.br">
    </div>

    <div class="pg-field" id="campo-senha">
      <label for="cad-senha">Senha</label>
      <input type="password" id="cad-senha" placeholder="Crie uma senha" autocomplete="new-password">
    </div>

    <div class="pg-field" id="campo-disciplina" style="display:none">
      <label for="cad-disciplina">Disciplina</label>
      <input type="text" id="cad-disciplina" placeholder="Ex: Engenharia de Software">
    </div>

    <button class="pg-btn" onclick="cadastrarPessoa()">
      <i class="fa-solid fa-user-plus"></i> Cadastrar
    </button>

  </div>
</main>

<script src="../css/js/script.js"></script>
<script src="../css/js/pages.js"></script>
<script src="../css/js/navbar.js"></script>
</body>
</html>
